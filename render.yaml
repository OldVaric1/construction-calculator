services:
  - type: web
    name: construction-calculator
    runtime: python
    region: oregon
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: construction-db
          property: connectionString

databases:
  - name: construction-db
    region: oregon
    plan: free